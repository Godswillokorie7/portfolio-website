<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iPhone Scientific Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
transition:0.3s;
}

.calculator{
width:100%;
max-width:420px;
height:100vh;
background:#000;
padding:20px;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:10px;
}

.top-bar h1{
color:white;
font-size:clamp(28px, 8vw, 55px);
font-weight:600;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.theme-btn{
background:#1f1f1f;
border:none;
color:white;
padding:12px 16px;
border-radius:18px;
font-size:18px;
cursor:pointer;
min-width:110px;
}

.theme-btn{
background:#1f1f1f;
border:none;
color:white;
padding:15px 20px;
border-radius:20px;
font-size:22px;
cursor:pointer;
transition:0.2s;
}

.display{
width:100%;
height:140px;
background:transparent;
border:none;
outline:none;
color:white;
font-size:90px;
text-align:right;
padding:20px 10px;
margin-bottom:20px;
}

.buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
}

button{
height:72px;
border:none;
border-radius:50%;
font-size:26px;
cursor:pointer;
transition:0.15s;
font-weight:500;
}

button:active{
transform:scale(0.92);
opacity:0.7;
}

.gray{
background:#a5a5a5;
color:black;
}

.dark{
background:#333;
color:white;
}

.orange{
background:#ff9f0a;
color:white;
}

.scientific{
background:#1f1f1f;
color:#00ffcc;
font-size:18px;
}

.zero{
grid-column:span 2;
border-radius:40px;
text-align:left;
padding-left:28px;
}

body.light{
background:#f4f4f4;
}

body.light .calculator{
background:#f4f4f4;
}

body.light .display{
color:black;
}

body.light .top-bar h1{
color:black;
}

body.light .dark{
background:#d4d4d4;
color:black;
}

body.light .scientific{
background:#cfcfcf;
color:black;
}

body.light .theme-btn{
background:#ddd;
color:black;
}

@media(max-width:500px){

.display{
font-size:70px;
}

button{
height:65px;
font-size:22px;
}

}

</style>
</head>

<body>

<div class="calculator">

<div class="top-bar">
<h1>Calculator</h1>

<button class="theme-btn" onclick="toggleTheme()">
🌙 Mode
</button>
</div>

<input type="text" class="display" id="display" readonly>

<div class="buttons">

<button class="scientific" onclick="append('Math.sin(')">sin</button>

<button class="scientific" onclick="append('Math.cos(')">cos</button>

<button class="scientific" onclick="append('Math.tan(')">tan</button>

<button class="scientific" onclick="append('Math.sqrt(')">√</button>

<button class="gray" onclick="clearDisplay()">AC</button>

<button class="scientific" onclick="append('Math.log10(')">log</button>

<button class="scientific" onclick="append('Math.PI')">π</button>

<button class="scientific" onclick="append('(')">(</button>

<button class="scientific" onclick="append(')')">)</button>

<button class="orange" onclick="append('/')">÷</button>

<button class="dark" onclick="append('7')">7</button>

<button class="dark" onclick="append('8')">8</button>

<button class="dark" onclick="append('9')">9</button>

<button class="scientific" onclick="backspace()">⌫</button>

<button class="orange" onclick="append('*')">×</button>

<button class="dark" onclick="append('4')">4</button>

<button class="dark" onclick="append('5')">5</button>

<button class="dark" onclick="append('6')">6</button>

<button class="scientific" onclick="append('**')">xʸ</button>

<button class="orange" onclick="append('-')">−</button>

<button class="dark" onclick="append('1')">1</button>

<button class="dark" onclick="append('2')">2</button>

<button class="dark" onclick="append('3')">3</button>

<button class="scientific" onclick="append('%')">%</button>

<button class="orange" onclick="append('+')">+</button>

<button class="dark zero" onclick="append('0')">0</button>

<button class="dark" onclick="append('.')">.</button>

<button class="orange" onclick="calculate()">=</button>

</div>
</div>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>

const display = document.getElementById('display');

const sound = document.getElementById('clickSound');

let calculation = '';

function vibrate(){
if(navigator.vibrate){
navigator.vibrate(15);
}
}

function playSound(){
sound.currentTime = 0;
sound.play();
vibrate();
}

function append(value){

playSound();

if(value === '*'){
display.value += '×';
}
else if(value === '/'){
display.value += '÷';
}
else{
display.value += value;
}

calculation += value;
}

function clearDisplay(){

playSound();

display.value = '';
calculation = '';
}

function backspace(){

playSound();

display.value = display.value.slice(0,-1);
calculation = calculation.slice(0,-1);
}

function calculate(){

playSound();

try{

let result = eval(calculation);

if(result === Infinity || result === -Infinity){
display.value = 'Cannot divide by 0';
}
else{
display.value = result;
calculation = result.toString();
}

}
catch{
display.value = 'Error';
}

}

function toggleTheme(){

playSound();

document.body.classList.toggle('light');

}

document.addEventListener('keydown', function(event){

const key = event.key;

if(!isNaN(key) || ['+','-','*','/','.','%','(',')'].includes(key)){
append(key);
}

if(key === 'Enter'){
calculate();
}

if(key === 'Backspace'){
backspace();
}

if(key.toLowerCase() === 'c'){
clearDisplay();
}

});

</script>

</body>
</html>
