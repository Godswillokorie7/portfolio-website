<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
}

.calculator{
width:100%;
max-width:420px;
height:100vh;
background:#000;
padding:20px;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
color:white;
}

.theme-btn{
background:#1c1c1c;
color:white;
border:none;
padding:10px 15px;
border-radius:12px;
font-size:14px;
cursor:pointer;
}

.display{
width:100%;
height:140px;
background:transparent;
border:none;
outline:none;
color:white;
font-size:55px;
text-align:right;
padding:20px 10px;
overflow-x:auto;
}

.buttons{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
}

button{
height:70px;
border:none;
border-radius:50%;
font-size:24px;
cursor:pointer;
transition:0.15s;
font-weight:500;
}

button:active{
transform:scale(0.92);
}

.gray{
background:#a5a5a5;
color:black;
}

.dark{
background:#333333;
color:white;
}

.orange{
background:#ff9f0a;
color:white;
}

.zero{
grid-column:span 2;
border-radius:40px;
text-align:left;
padding-left:28px;
}

.scientific{
background:#1f1f1f;
color:#00ffcc;
font-size:18px;
}

body.light{
background:#f4f4f4;
}

body.light .calculator{
background:#f4f4f4;
}

body.light .display{
color:#000;
}

body.light .dark{
background:#d4d4d4;
color:black;
}

body.light .scientific{
background:#cfcfcf;
color:#000;
}

body.light .theme-btn{
background:#ddd;
color:black;
}

@media(max-width:500px){
button{
height:65px;
font-size:22px;
}

.display{
font-size:45px;
}
}
</style>
</head>
<body>

<div class="calculator">

<div class="top-bar">
<h2>Calculator</h2>
<button class="theme-btn" onclick="toggleTheme()">🌙 Mode</button>
</div>

<input type="text" class="display" id="display" readonly>

<div class="buttons">

<button class="scientific" onclick="append('Math.sin(')">sin</button>
<button class="scientific" onclick="append('Math.cos(')">cos</button>
<button class="scientific" onclick="append('Math.tan(')">tan</button>
<button class="scientific" onclick="append('Math.sqrt(')">√</button>
<button class="gray" onclick="clearDisplay()">AC</button>

<button class="scientific" onclick="append('Math.log10(')">log</button>
<button class="scientific" onclick="append('Math.PI')">π</button>
<button class="scientific" onclick="append('(')">(</button>
<button class="scientific" onclick="append(')')">)</button>
<button class="orange" onclick="append('/')">÷</button>

<button class="dark" onclick="append('7')">7</button>
<button class="dark" onclick="append('8')">8</button>
<button class="dark" onclick="append('9')">9</button>
<button class="scientific" onclick="backspace()">⌫</button>
<button class="orange" onclick="append('*')">×</button>

<button class="dark" onclick="append('4')">4</button>
<button class="dark" onclick="append('5')">5</button>
<button class="dark" onclick="append('6')">6</button>
<button class="scientific" onclick="append('**')">xʸ</button>
<button class="orange" onclick="append('-')">−</button>

<button class="dark" onclick="append('1')">1</button>
<button class="dark" onclick="append('2')">2</button>
<button class="dark" onclick="append('3')">3</button>
<button class="scientific" onclick="append('%')">%</button>
<button class="orange" onclick="append('+')">+</button>

<button class="dark zero" onclick="append('0')">0</button>
<button class="dark" onclick="append('.')">.</button>
<button class="orange" onclick="calculate()">=</button>

</div>
</div>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
const display = document.getElementById('display');
const sound = document.getElementById('clickSound');

function playSound(){
sound.currentTime = 0;
sound.play();
}

function append(value){
playSound();
display.value += value;
}

function clearDisplay(){
playSound();
display.value = '';
}

function backspace(){
playSound();
display.value = display.value.slice(0,-1);
}

function calculate(){
playSound();
try{
display.value = eval(display.value);
}catch{
display.value = 'Error';
}
}

function toggleTheme(){
playSound();
document.body.classList.toggle('light');
}

// Keyboard support

document.addEventListener('keydown', function(event){
const key = event.key;

if(!isNaN(key) || ['+','-','*','/','.','%','(',')'].includes(key)){
append(key);
}

if(key === 'Enter'){
calculate();
}

if(key === 'Backspace'){
backspace();
}

if(key.toLowerCase() === 'c'){
clearDisplay();
}
});
</script>

</body>
</html>
